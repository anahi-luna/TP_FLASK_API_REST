version: '3.9' # Versión de docker-compose

services:
    api: # Nombre del servicio
      build:
        context: ..
        # Carpeta base desde donde se construye la imagen (raíz del proyecto)

        dockerfile: deploy/Dockerfile
        # Ruta al Dockerfile que se va a usar

      container_name: contactos_api


      ports:
        - "5000:5000"
      volumes:
        - ../backend:/app
        # Vincula tu carpeta local con el contenedor


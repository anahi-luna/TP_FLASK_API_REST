version: '3.9'

services:

  api:
    build:
      context:
       ..
      dockerfile: deploy/Dockerfile.backend

    container_name: contactos_api

    ports:
      - "5000:5000"

    volumes:
      - ../backend:/app

  frontend:
    build:
      context: ..
      dockerfile: deploy/Dockerfile.frontend

    container_name: contactos_frontend

    ports:
      - "5173:80"

    depends_on:
      - api